services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ege_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  parser:
    build:
      context: .
      dockerfile: Dockerfile
    image: ege-helper-bot:latest
    container_name: ege_parser
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      # чтобы rich рисовал прогресс-бар цветным в логах
      TERM: xterm-256color
      FORCE_COLOR: "1"
    tty: true
    command: ["python", "-m", "parser.main"]
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: ege_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ege_helper
      POSTGRES_USER: ege_user
      POSTGRES_PASSWORD: ege_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ege_user -d ege_helper"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: ege_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
